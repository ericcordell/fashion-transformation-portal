<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Guide Button Test</title>
<style>
.guide-button {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: linear-gradient(135deg, #0053e2 0%, #0041b0 100%);
  color: white;
  border: none;
  border-radius: 50px;
  padding: 16px 28px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(0, 83, 226, 0.3);
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 10px;
}

.guide-button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0, 83, 226, 0.4);
}
</style>
</head>
<body>
<h1>Test Page - Look for Blue Button in Bottom-Right Corner</h1>
<p>If you see a blue button that says "📖 OPIF Field Guide" in the bottom-right corner, the button is working!</p>

<button class="guide-button" onclick="alert('Guide button clicked!')">
  <span style="font-size: 20px;">📖</span>
  <span>OPIF Field Guide</span>
</button>

</body>
</html>
